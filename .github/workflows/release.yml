name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create a release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PS2EXE
        shell: powershell
        run: Install-Module ps2exe -Scope CurrentUser -Force -AllowClobber

      - name: Build exe and assets
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          .\Build-Rapidapter.ps1 -Version $version

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppVersion=$version installer\Rapidapter.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE" }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Rapidapter ${{ github.ref_name }}"
          draft: true
          generate_release_notes: true
          files: |
            installer/Output/Rapidapter-Setup-*.exe